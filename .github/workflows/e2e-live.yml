name: E2E Live CI

# The live-collaboration Playwright suite drives a real quarry server
# (lib-documents build) plus the vite dev server — the only coverage that
# crosses the Rust/browser boundary, so it runs on changes to either side.
on:
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "ui/**"
      - "fixtures/**"
      - ".github/workflows/e2e-live.yml"
  pull_request:
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "ui/**"
      - "fixtures/**"
      - ".github/workflows/e2e-live.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  e2e-live:
    name: E2E (live server)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install system prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config libssl-dev fuse3
      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          cache-on-failure: true
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - name: Install UI dependencies
        working-directory: ui
        run: bun install --frozen-lockfile
      # quarry-server embeds ui/dist at compile time (rust_embed)
      - name: Build browser bundle
        working-directory: ui
        run: bun run build
      # Prebuild so the Playwright webServer readiness budget (120s) is not
      # spent compiling; the config's `cargo run` then reuses this build.
      - name: Build quarry server
        run: cargo build --locked -p quarry --features lib-documents
      - name: Install Playwright browsers
        working-directory: ui
        run: bunx playwright install --with-deps chromium
      - name: Run live suite
        working-directory: ui
        run: bun run test:e2e:live
