name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-publish
  cancel-in-progress: false

permissions: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Validate tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      prerelease: ${{ steps.validate.outputs.prerelease }}
    steps:
      - name: Check out release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Validate tag and workspace version
        id: validate
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version=$(cargo metadata --no-deps --format-version 1 |
            jq -r '.packages[] | select(.name == "quarry") | .version')

          if [[ "$TAG" != "v${version}" ]]; then
            echo "Release tag ${TAG} does not match workspace version ${version}" >&2
            exit 1
          fi

          if [[ "$(git cat-file -t "refs/tags/${TAG}")" != "tag" ]]; then
            echo "Release tag ${TAG} must be annotated" >&2
            exit 1
          fi

          if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-nightly\.[0-9]{8}(\.[0-9]+)?$ ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "Unsupported release tag: ${TAG}" >&2
            exit 1
          fi

  verify:
    name: Verify release
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install system prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config libssl-dev fuse3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          no-cache: true

      - name: Verify browser workspace
        working-directory: ui
        run: |
          bun install --frozen-lockfile
          bun run fixtures:check
          bun run typecheck
          bun run test
          bun run build

      - name: Test Rust workspace
        run: |
          cargo test --locked --workspace
          cargo test --locked -p quarry-server -p quarry-cli -p quarry --all-features

  build:
    name: Build
    needs: [validate, verify]
    permissions:
      contents: read
      id-token: write
      attestations: write
    uses: ./.github/workflows/release-build.yml

  publish:
    name: Publish GitHub release
    needs: [validate, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          pattern: artifacts-quarry-*
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          PRERELEASE: ${{ needs.validate.outputs.prerelease }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "GitHub release ${TAG} already exists"
            exit 0
          fi
          prerelease_flag=()
          if [[ "$PRERELEASE" == "true" ]]; then
            prerelease_flag+=(--prerelease)
          fi
          gh release create "$TAG" \
            --generate-notes --title "$TAG" \
            "${prerelease_flag[@]}" dist/*

  docker:
    name: Publish immutable Docker image
    needs: [validate, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      image-digest: ${{ steps.publish-image.outputs.digest }}
    steps:
      - name: Check out release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.ref_name }}
          persist-credentials: false

      - name: Build and publish multi-arch image
        id: publish-image
        uses: ./.github/actions/release-docker
        with:
          tag: ${{ github.ref_name }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

  promote-nightly:
    name: Promote nightly Docker alias
    needs: [validate, publish, docker]
    if: needs.validate.outputs.prerelease == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Move nightly alias
        env:
          DIGEST: ${{ needs.docker.outputs.image-digest }}
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/fabro-sh/quarry:nightly \
            "ghcr.io/fabro-sh/quarry@${DIGEST}"
          docker buildx imagetools inspect ghcr.io/fabro-sh/quarry:nightly

  deploy-production:
    name: Deploy production
    needs: [validate, docker]
    if: needs.validate.outputs.prerelease == 'false'
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: quarry-production
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: us-east-1
      AWS_ROLE_ARN: arn:aws:iam::449957914122:role/quarry-github-actions-deploy
      QUARRY_PUBLIC_HEALTH_URL: https://quarry.lithos.computer/v1/health
      QUARRY_IMAGE: ghcr.io/fabro-sh/quarry
      QUARRY_INSTANCE_NAME: quarry-production
      QUARRY_SERVICE_TAG: quarry
      QUARRY_ALB_NAME: quarry-production-alb
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy pinned image by SSM
        id: deploy
        env:
          TAG: ${{ github.ref_name }}
          IMAGE_DIGEST: ${{ needs.docker.outputs.image-digest }}
        run: |
          set -euo pipefail

          if [[ -z "$IMAGE_DIGEST" || "$IMAGE_DIGEST" != sha256:* ]]; then
            echo "Invalid Docker image digest: ${IMAGE_DIGEST}" >&2
            exit 1
          fi

          image="${QUARRY_IMAGE}@${IMAGE_DIGEST}"
          instance_id="$(aws ec2 describe-instances \
            --region "$AWS_REGION" \
            --filters \
              "Name=tag:Service,Values=${QUARRY_SERVICE_TAG}" \
              "Name=tag:Name,Values=${QUARRY_INSTANCE_NAME}" \
              "Name=instance-state-name,Values=running" \
            --query 'Reservations[].Instances[].InstanceId' \
            --output text)"

          if [[ -z "$instance_id" || "$instance_id" == "None" || "$instance_id" == *$'\t'* ]]; then
            echo "Expected exactly one running Quarry production instance, got: ${instance_id}" >&2
            exit 1
          fi

          remote_script="$(cat <<SCRIPT
          #!/usr/bin/env bash
          set -euxo pipefail
          cd /opt/quarry
          backup="compose.yaml.\$(date -u +%Y%m%dT%H%M%SZ).bak"
          sudo cp compose.yaml "\$backup"
          echo "backup=\$backup"
          grep -n image: compose.yaml
          sudo sed -i -E "s#image: ghcr.io/fabro-sh/quarry@sha256:[0-9a-f]+#image: ${image}#" compose.yaml
          grep -n image: compose.yaml
          sudo docker compose pull
          sudo docker compose up -d
          for i in \$(seq 1 60); do
            if curl -fsS http://127.0.0.1:8080/v1/health >/tmp/quarry-health.json; then
              break
            fi
            sleep 2
          done
          cat /tmp/quarry-health.json
          echo
          sudo docker compose ps
          cid=\$(sudo docker compose ps -q quarry)
          sudo docker inspect --format "container={{.Name}} image={{.Config.Image}} image_id={{.Image}} status={{.State.Status}} health={{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}" "\$cid"
          sudo docker logs --tail=80 "\$cid" 2>&1 | tail -80
          SCRIPT
          )"

          jq -n --arg script "$remote_script" '{commands: [$script]}' > ssm-parameters.json

          command_id="$(aws ssm send-command \
            --region "$AWS_REGION" \
            --instance-ids "$instance_id" \
            --document-name AWS-RunShellScript \
            --comment "Deploy Quarry ${TAG} (${IMAGE_DIGEST})" \
            --parameters file://ssm-parameters.json \
            --query Command.CommandId \
            --output text)"

          set +e
          aws ssm wait command-executed \
            --region "$AWS_REGION" \
            --command-id "$command_id" \
            --instance-id "$instance_id"
          wait_status=$?
          set -e

          aws ssm get-command-invocation \
            --region "$AWS_REGION" \
            --command-id "$command_id" \
            --instance-id "$instance_id"

          if [[ "$wait_status" -ne 0 ]]; then
            exit "$wait_status"
          fi

          {
            echo "instance-id=${instance_id}"
            echo "command-id=${command_id}"
            echo "image=${image}"
          } >> "$GITHUB_OUTPUT"

      - name: Verify Docker health through SSM
        run: |
          set -euo pipefail

          remote_script='#!/usr/bin/env bash
          set -euo pipefail
          cd /opt/quarry
          cid=$(sudo docker compose ps -q quarry)
          for i in $(seq 1 40); do
            health=$(sudo docker inspect --format "{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}" "$cid")
            echo "docker_health=${health}"
            if [[ "$health" == "healthy" ]]; then
              curl -fsS http://127.0.0.1:8080/v1/health
              exit 0
            fi
            sleep 3
          done
          sudo docker compose ps
          exit 1'

          jq -n --arg script "$remote_script" '{commands: [$script]}' > ssm-verify-parameters.json
          command_id="$(aws ssm send-command \
            --region "$AWS_REGION" \
            --instance-ids "${{ steps.deploy.outputs.instance-id }}" \
            --document-name AWS-RunShellScript \
            --comment "Verify Quarry production health" \
            --parameters file://ssm-verify-parameters.json \
            --query Command.CommandId \
            --output text)"

          set +e
          aws ssm wait command-executed \
            --region "$AWS_REGION" \
            --command-id "$command_id" \
            --instance-id "${{ steps.deploy.outputs.instance-id }}"
          wait_status=$?
          set -e

          aws ssm get-command-invocation \
            --region "$AWS_REGION" \
            --command-id "$command_id" \
            --instance-id "${{ steps.deploy.outputs.instance-id }}"

          if [[ "$wait_status" -ne 0 ]]; then
            exit "$wait_status"
          fi

      - name: Verify ALB target health
        run: |
          set -euo pipefail

          alb_arn="$(aws elbv2 describe-load-balancers \
            --region "$AWS_REGION" \
            --names "$QUARRY_ALB_NAME" \
            --query 'LoadBalancers[0].LoadBalancerArn' \
            --output text)"

          tg_arns="$(aws elbv2 describe-target-groups \
            --region "$AWS_REGION" \
            --load-balancer-arn "$alb_arn" \
            --query 'TargetGroups[].TargetGroupArn' \
            --output text)"

          for tg_arn in $tg_arns; do
            for i in $(seq 1 30); do
              state="$(aws elbv2 describe-target-health \
                --region "$AWS_REGION" \
                --target-group-arn "$tg_arn" \
                --query 'TargetHealthDescriptions[?Target.Id==`${{ steps.deploy.outputs.instance-id }}`].TargetHealth.State | [0]' \
                --output text)"
              echo "${tg_arn}: ${state}"
              if [[ "$state" == "healthy" ]]; then
                break
              fi
              sleep 10
            done

            if [[ "$state" != "healthy" ]]; then
              aws elbv2 describe-target-health \
                --region "$AWS_REGION" \
                --target-group-arn "$tg_arn"
              exit 1
            fi
          done

      - name: Verify public health
        run: curl -fsS -D - "$QUARRY_PUBLIC_HEALTH_URL"

  promote-stable:
    name: Promote latest Docker alias
    needs: [validate, publish, docker, deploy-production]
    if: needs.validate.outputs.prerelease == 'false'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Move latest alias
        env:
          DIGEST: ${{ needs.docker.outputs.image-digest }}
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/fabro-sh/quarry:latest \
            "ghcr.io/fabro-sh/quarry@${DIGEST}"
          docker buildx imagetools inspect ghcr.io/fabro-sh/quarry:latest

  update-formula:
    name: Update Homebrew formula
    needs: [validate, publish, deploy-production]
    if: needs.validate.outputs.prerelease == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          pattern: artifacts-quarry-*
          merge-multiple: true

      - name: Generate and push formula
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          SHA_AARCH64_DARWIN=$(awk '{print $1}' dist/quarry-aarch64-apple-darwin.tar.gz.sha256)
          SHA_X86_64_DARWIN=$(awk '{print $1}' dist/quarry-x86_64-apple-darwin.tar.gz.sha256)
          SHA_AARCH64_LINUX=$(awk '{print $1}' dist/quarry-aarch64-unknown-linux-gnu.tar.gz.sha256)
          SHA_X86_64_LINUX=$(awk '{print $1}' dist/quarry-x86_64-unknown-linux-gnu.tar.gz.sha256)

          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch origin main
          git checkout -B main origin/main

          ruby scripts/update-homebrew-formula.rb \
            Formula/quarry.rb \
            "$TAG" \
            "$SHA_AARCH64_DARWIN" \
            "$SHA_X86_64_DARWIN" \
            "$SHA_AARCH64_LINUX" \
            "$SHA_X86_64_LINUX"

          if git diff --quiet -- Formula/quarry.rb; then
            echo "Homebrew formula already points at ${TAG}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/quarry.rb
          git commit -m "build: update Homebrew formula for ${TAG}"

          for attempt in 1 2 3; do
            git pull --rebase origin main
            if git push origin HEAD:main; then
              exit 0
            fi
            sleep 5
          done

          echo "Unable to push Homebrew formula update after 3 attempts" >&2
          exit 1
