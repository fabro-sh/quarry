name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  linux-x86_64:
    name: Linux x86_64 release artifact
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install system prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config libssl-dev git fuse3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Build browser bundle
        working-directory: ui
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Build release binary
        run: cargo build --release -p quarry --target x86_64-unknown-linux-gnu

      - name: Package artifact
        run: |
          mkdir -p dist/quarry-x86_64-unknown-linux-gnu
          cp target/x86_64-unknown-linux-gnu/release/quarry dist/quarry-x86_64-unknown-linux-gnu/
          cp README.md dist/quarry-x86_64-unknown-linux-gnu/
          cp -R docs dist/quarry-x86_64-unknown-linux-gnu/
          tar -C dist -czf dist/quarry-x86_64-unknown-linux-gnu.tar.gz quarry-x86_64-unknown-linux-gnu
          shasum -a 256 dist/quarry-x86_64-unknown-linux-gnu.tar.gz > dist/quarry-x86_64-unknown-linux-gnu.tar.gz.sha256

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: quarry-x86_64-unknown-linux-gnu
          path: |
            dist/quarry-x86_64-unknown-linux-gnu.tar.gz
            dist/quarry-x86_64-unknown-linux-gnu.tar.gz.sha256

      - name: Attach files to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/quarry-x86_64-unknown-linux-gnu.tar.gz
            dist/quarry-x86_64-unknown-linux-gnu.tar.gz.sha256
