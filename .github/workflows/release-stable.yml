name: Release Stable

on:
  workflow_dispatch:

concurrency:
  group: release-stable
  cancel-in-progress: false

permissions: {}

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.plan.outputs.tag }}
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Plan stable release
        id: plan
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version=$(cargo metadata --no-deps --format-version 1 |
            jq -r '.packages[] | select(.name == "quarry") | .version')
          tag="v${version}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists — bump the workspace version first." >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  build:
    name: Build
    needs: plan
    permissions:
      contents: read
    uses: ./.github/workflows/release-build.yml

  publish:
    name: Publish
    needs: [plan, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release tag/release and upload artifacts
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          pattern: artifacts-quarry-*
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.plan.outputs.tag }}
        run: |
          gh release create "$TAG" --target "$GITHUB_SHA" \
            --generate-notes --title "$TAG" \
            dist/*

  update-formula:
    name: Update Homebrew formula
    needs: [plan, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write # commit the regenerated Formula/quarry.rb to main
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          pattern: artifacts-quarry-*
          merge-multiple: true

      - name: Generate and push formula
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.plan.outputs.tag }}
        run: |
          set -euo pipefail

          SHA_AARCH64_DARWIN=$(awk '{print $1}' dist/quarry-aarch64-apple-darwin.tar.gz.sha256)
          SHA_X86_64_DARWIN=$(awk '{print $1}' dist/quarry-x86_64-apple-darwin.tar.gz.sha256)
          SHA_AARCH64_LINUX=$(awk '{print $1}' dist/quarry-aarch64-unknown-linux-gnu.tar.gz.sha256)
          SHA_X86_64_LINUX=$(awk '{print $1}' dist/quarry-x86_64-unknown-linux-gnu.tar.gz.sha256)

          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch origin main
          git checkout -B main origin/main

          ruby scripts/update-homebrew-formula.rb \
            Formula/quarry.rb \
            "$TAG" \
            "$SHA_AARCH64_DARWIN" \
            "$SHA_X86_64_DARWIN" \
            "$SHA_AARCH64_LINUX" \
            "$SHA_X86_64_LINUX"

          if git diff --quiet -- Formula/quarry.rb; then
            echo "Homebrew formula already points at ${TAG}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/quarry.rb
          git commit -m "build: update Homebrew formula for ${TAG}"

          for attempt in 1 2 3; do
            git pull --rebase origin main
            if git push origin HEAD:main; then
              exit 0
            fi
            sleep 5
          done

          echo "Unable to push Homebrew formula update after 3 attempts" >&2
          exit 1

  docker:
    name: Publish Docker image
    needs: [plan, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Check out release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.plan.outputs.tag }}
          persist-credentials: false

      - name: Build and publish multi-arch image
        uses: ./.github/actions/release-docker
        with:
          tag: ${{ needs.plan.outputs.tag }}
          prerelease: "false"
          github-token: ${{ secrets.GITHUB_TOKEN }}
