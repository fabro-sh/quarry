name: Release Stable

on:
  workflow_dispatch:

concurrency:
  group: release-stable
  cancel-in-progress: false

permissions: {}

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.plan.outputs.tag }}
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Plan stable release
        id: plan
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version=$(cargo metadata --no-deps --format-version 1 |
            jq -r '.packages[] | select(.name == "quarry") | .version')
          tag="v${version}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists — bump the workspace version first." >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  build:
    name: Build
    needs: plan
    permissions:
      contents: read
    uses: ./.github/workflows/release-build.yml

  publish:
    name: Publish
    needs: [plan, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release tag/release and upload artifacts
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          pattern: artifacts-quarry-*
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.plan.outputs.tag }}
        run: |
          gh release create "$TAG" --target "$GITHUB_SHA" \
            --generate-notes --title "$TAG" \
            dist/*

  update-formula:
    name: Update Homebrew formula
    needs: [plan, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write # commit the regenerated Formula/quarry.rb to main
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          pattern: artifacts-quarry-*
          merge-multiple: true

      - name: Generate and push formula
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.plan.outputs.tag }}
        run: |
          set -euo pipefail

          SHA_AARCH64_DARWIN=$(awk '{print $1}' dist/quarry-aarch64-apple-darwin.tar.gz.sha256)
          SHA_X86_64_DARWIN=$(awk '{print $1}' dist/quarry-x86_64-apple-darwin.tar.gz.sha256)
          SHA_AARCH64_LINUX=$(awk '{print $1}' dist/quarry-aarch64-unknown-linux-gnu.tar.gz.sha256)
          SHA_X86_64_LINUX=$(awk '{print $1}' dist/quarry-x86_64-unknown-linux-gnu.tar.gz.sha256)

          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch origin main
          git checkout -B main origin/main

          ruby scripts/update-homebrew-formula.rb \
            Formula/quarry.rb \
            "$TAG" \
            "$SHA_AARCH64_DARWIN" \
            "$SHA_X86_64_DARWIN" \
            "$SHA_AARCH64_LINUX" \
            "$SHA_X86_64_LINUX"

          if git diff --quiet -- Formula/quarry.rb; then
            echo "Homebrew formula already points at ${TAG}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/quarry.rb
          git commit -m "build: update Homebrew formula for ${TAG}"

          for attempt in 1 2 3; do
            git pull --rebase origin main
            if git push origin HEAD:main; then
              exit 0
            fi
            sleep 5
          done

          echo "Unable to push Homebrew formula update after 3 attempts" >&2
          exit 1

  docker:
    name: Publish Docker image
    needs: [plan, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      image-digest: ${{ steps.publish-image.outputs.digest }}
    steps:
      - name: Check out release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.plan.outputs.tag }}
          persist-credentials: false

      - name: Build and publish multi-arch image
        id: publish-image
        uses: ./.github/actions/release-docker
        with:
          tag: ${{ needs.plan.outputs.tag }}
          prerelease: "false"
          github-token: ${{ secrets.GITHUB_TOKEN }}

  deploy-production:
    name: Deploy production
    needs: [plan, docker]
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: quarry-production
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: us-east-1
      AWS_ROLE_ARN: arn:aws:iam::449957914122:role/quarry-github-actions-deploy
      QUARRY_PUBLIC_HEALTH_URL: https://quarry.lithos.computer/v1/health
      QUARRY_IMAGE: ghcr.io/fabro-sh/quarry
      QUARRY_INSTANCE_NAME: quarry-production
      QUARRY_SERVICE_TAG: quarry
      QUARRY_ALB_NAME: quarry-production-alb
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy pinned image by SSM
        id: deploy
        env:
          TAG: ${{ needs.plan.outputs.tag }}
          IMAGE_DIGEST: ${{ needs.docker.outputs.image-digest }}
        run: |
          set -euo pipefail

          if [[ -z "$IMAGE_DIGEST" || "$IMAGE_DIGEST" != sha256:* ]]; then
            echo "Invalid Docker image digest: ${IMAGE_DIGEST}" >&2
            exit 1
          fi

          image="${QUARRY_IMAGE}@${IMAGE_DIGEST}"
          instance_id="$(aws ec2 describe-instances \
            --region "$AWS_REGION" \
            --filters \
              "Name=tag:Service,Values=${QUARRY_SERVICE_TAG}" \
              "Name=tag:Name,Values=${QUARRY_INSTANCE_NAME}" \
              "Name=instance-state-name,Values=running" \
            --query 'Reservations[].Instances[].InstanceId' \
            --output text)"

          if [[ -z "$instance_id" || "$instance_id" == "None" || "$instance_id" == *$'\t'* ]]; then
            echo "Expected exactly one running Quarry production instance, got: ${instance_id}" >&2
            exit 1
          fi

          remote_script="$(cat <<SCRIPT
          #!/usr/bin/env bash
          set -euxo pipefail
          cd /opt/quarry
          backup="compose.yaml.\$(date -u +%Y%m%dT%H%M%SZ).bak"
          sudo cp compose.yaml "\$backup"
          echo "backup=\$backup"
          grep -n image: compose.yaml
          sudo sed -i -E "s#image: ghcr.io/fabro-sh/quarry@sha256:[0-9a-f]+#image: ${image}#" compose.yaml
          grep -n image: compose.yaml
          sudo docker compose pull
          sudo docker compose up -d
          for i in \$(seq 1 60); do
            if curl -fsS http://127.0.0.1:8080/v1/health >/tmp/quarry-health.json; then
              break
            fi
            sleep 2
          done
          cat /tmp/quarry-health.json
          echo
          sudo docker compose ps
          cid=\$(sudo docker compose ps -q quarry)
          sudo docker inspect --format "container={{.Name}} image={{.Config.Image}} image_id={{.Image}} status={{.State.Status}} health={{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}" "\$cid"
          sudo docker logs --tail=80 "\$cid" 2>&1 | tail -80
          SCRIPT
          )"

          jq -n --arg script "$remote_script" '{commands: [$script]}' > ssm-parameters.json

          command_id="$(aws ssm send-command \
            --region "$AWS_REGION" \
            --instance-ids "$instance_id" \
            --document-name AWS-RunShellScript \
            --comment "Deploy Quarry ${TAG} (${IMAGE_DIGEST})" \
            --parameters file://ssm-parameters.json \
            --query Command.CommandId \
            --output text)"

          set +e
          aws ssm wait command-executed \
            --region "$AWS_REGION" \
            --command-id "$command_id" \
            --instance-id "$instance_id"
          wait_status=$?
          set -e

          aws ssm get-command-invocation \
            --region "$AWS_REGION" \
            --command-id "$command_id" \
            --instance-id "$instance_id"

          if [[ "$wait_status" -ne 0 ]]; then
            exit "$wait_status"
          fi

          {
            echo "instance-id=${instance_id}"
            echo "command-id=${command_id}"
            echo "image=${image}"
          } >> "$GITHUB_OUTPUT"

      - name: Verify Docker health through SSM
        run: |
          set -euo pipefail

          remote_script='#!/usr/bin/env bash
          set -euo pipefail
          cd /opt/quarry
          cid=$(sudo docker compose ps -q quarry)
          for i in $(seq 1 40); do
            health=$(sudo docker inspect --format "{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}" "$cid")
            echo "docker_health=${health}"
            if [[ "$health" == "healthy" ]]; then
              curl -fsS http://127.0.0.1:8080/v1/health
              exit 0
            fi
            sleep 3
          done
          sudo docker compose ps
          exit 1'

          jq -n --arg script "$remote_script" '{commands: [$script]}' > ssm-verify-parameters.json
          command_id="$(aws ssm send-command \
            --region "$AWS_REGION" \
            --instance-ids "${{ steps.deploy.outputs.instance-id }}" \
            --document-name AWS-RunShellScript \
            --comment "Verify Quarry production health" \
            --parameters file://ssm-verify-parameters.json \
            --query Command.CommandId \
            --output text)"

          set +e
          aws ssm wait command-executed \
            --region "$AWS_REGION" \
            --command-id "$command_id" \
            --instance-id "${{ steps.deploy.outputs.instance-id }}"
          wait_status=$?
          set -e

          aws ssm get-command-invocation \
            --region "$AWS_REGION" \
            --command-id "$command_id" \
            --instance-id "${{ steps.deploy.outputs.instance-id }}"

          if [[ "$wait_status" -ne 0 ]]; then
            exit "$wait_status"
          fi

      - name: Verify ALB target health
        run: |
          set -euo pipefail

          alb_arn="$(aws elbv2 describe-load-balancers \
            --region "$AWS_REGION" \
            --names "$QUARRY_ALB_NAME" \
            --query 'LoadBalancers[0].LoadBalancerArn' \
            --output text)"

          tg_arns="$(aws elbv2 describe-target-groups \
            --region "$AWS_REGION" \
            --load-balancer-arn "$alb_arn" \
            --query 'TargetGroups[].TargetGroupArn' \
            --output text)"

          for tg_arn in $tg_arns; do
            for i in $(seq 1 30); do
              state="$(aws elbv2 describe-target-health \
                --region "$AWS_REGION" \
                --target-group-arn "$tg_arn" \
                --query 'TargetHealthDescriptions[?Target.Id==`${{ steps.deploy.outputs.instance-id }}`].TargetHealth.State | [0]' \
                --output text)"
              echo "${tg_arn}: ${state}"
              if [[ "$state" == "healthy" ]]; then
                break
              fi
              sleep 10
            done

            if [[ "$state" != "healthy" ]]; then
              aws elbv2 describe-target-health \
                --region "$AWS_REGION" \
                --target-group-arn "$tg_arn"
              exit 1
            fi
          done

      - name: Verify public health
        run: curl -fsS -D - "$QUARRY_PUBLIC_HEALTH_URL"
