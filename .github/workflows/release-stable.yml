name: Release Stable

on:
  workflow_dispatch:

concurrency:
  group: release-stable
  cancel-in-progress: false

permissions: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  stable:
    name: Stable release
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release tag/release and upload artifacts
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Plan stable release
        id: plan
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version=$(cargo metadata --no-deps --format-version 1 |
            jq -r '.packages[] | select(.name == "quarry") | .version')
          tag="v${version}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists — bump the workspace version first." >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Install system prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config libssl-dev fuse3

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          no-cache: true

      - name: Build browser bundle
        working-directory: ui
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Build release binary
        run: cargo build --locked --release -p quarry --target x86_64-unknown-linux-gnu

      - name: Package artifact
        run: |
          mkdir -p dist/quarry-x86_64-unknown-linux-gnu
          cp target/x86_64-unknown-linux-gnu/release/quarry dist/quarry-x86_64-unknown-linux-gnu/
          cp README.md dist/quarry-x86_64-unknown-linux-gnu/
          cp -R docs dist/quarry-x86_64-unknown-linux-gnu/
          tar -C dist -czf dist/quarry-x86_64-unknown-linux-gnu.tar.gz quarry-x86_64-unknown-linux-gnu
          shasum -a 256 dist/quarry-x86_64-unknown-linux-gnu.tar.gz > dist/quarry-x86_64-unknown-linux-gnu.tar.gz.sha256

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.plan.outputs.tag }}
        run: |
          gh release create "$TAG" --target "$GITHUB_SHA" \
            --generate-notes --title "$TAG" \
            dist/quarry-x86_64-unknown-linux-gnu.tar.gz \
            dist/quarry-x86_64-unknown-linux-gnu.tar.gz.sha256
