name: Release Build

on:
  workflow_call:

permissions: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  compile:
    name: Compile (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-15
          - target: x86_64-apple-darwin
            runner: macos-15
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
    env:
      TARGET: ${{ matrix.target }}
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Install system prerequisites
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config libssl-dev fuse3

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add "$TARGET"

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          no-cache: true

      - name: Build browser bundle
        working-directory: ui
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Build release binary
        run: cargo build --locked --release -p quarry --target "$TARGET"

      - name: Package artifact
        run: |
          mkdir -p "dist/quarry-$TARGET"
          cp "target/$TARGET/release/quarry" "dist/quarry-$TARGET/"
          cp README.md LICENSE "dist/quarry-$TARGET/"
          cp -R docs "dist/quarry-$TARGET/"
          tar -C dist -czf "dist/quarry-$TARGET.tar.gz" "quarry-$TARGET"
          (cd dist && shasum -a 256 "quarry-$TARGET.tar.gz" > "quarry-$TARGET.tar.gz.sha256")

      - name: Upload workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: artifacts-quarry-${{ matrix.target }}
          path: |
            dist/quarry-${{ matrix.target }}.tar.gz
            dist/quarry-${{ matrix.target }}.tar.gz.sha256
