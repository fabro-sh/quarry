name: Release Nightly

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

concurrency:
  group: release-nightly
  cancel-in-progress: false

permissions: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  nightly:
    name: Nightly release
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the nightly tag/release and upload artifacts
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0 # full history + tags for nightly probing
          persist-credentials: false

      - name: Plan nightly release
        id: plan
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version=$(cargo metadata --no-deps --format-version 1 |
            jq -r '.packages[] | select(.name == "quarry") | .version')
          tag="v${version}-nightly.$(date -u +%Y%m%d)"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          last_tag=$(git describe --tags --match 'v*-nightly.*' --abbrev=0 2>/dev/null || true)
          if [[ -n "$last_tag" ]] && [[ "$(git rev-parse HEAD)" == "$(git rev-parse "$last_tag^{commit}")" ]]; then
            echo "HEAD already released as $last_tag — nothing to release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          elif gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists — nothing to release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install system prerequisites
        if: steps.plan.outputs.skip != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config libssl-dev fuse3

      - name: Install Rust
        if: steps.plan.outputs.skip != 'true'
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install Bun
        if: steps.plan.outputs.skip != 'true'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          no-cache: true

      - name: Build browser bundle
        if: steps.plan.outputs.skip != 'true'
        working-directory: ui
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Build release binary
        if: steps.plan.outputs.skip != 'true'
        run: cargo build --locked --release -p quarry --target x86_64-unknown-linux-gnu

      - name: Package artifact
        if: steps.plan.outputs.skip != 'true'
        run: |
          mkdir -p dist/quarry-x86_64-unknown-linux-gnu
          cp target/x86_64-unknown-linux-gnu/release/quarry dist/quarry-x86_64-unknown-linux-gnu/
          cp README.md dist/quarry-x86_64-unknown-linux-gnu/
          cp -R docs dist/quarry-x86_64-unknown-linux-gnu/
          tar -C dist -czf dist/quarry-x86_64-unknown-linux-gnu.tar.gz quarry-x86_64-unknown-linux-gnu
          shasum -a 256 dist/quarry-x86_64-unknown-linux-gnu.tar.gz > dist/quarry-x86_64-unknown-linux-gnu.tar.gz.sha256

      - name: Create nightly prerelease
        if: steps.plan.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.plan.outputs.tag }}
        run: |
          gh release create "$TAG" --target "$GITHUB_SHA" \
            --prerelease --generate-notes --title "$TAG" \
            dist/quarry-x86_64-unknown-linux-gnu.tar.gz \
            dist/quarry-x86_64-unknown-linux-gnu.tar.gz.sha256
