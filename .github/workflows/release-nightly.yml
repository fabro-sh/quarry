name: Release Nightly

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

concurrency:
  group: release-nightly
  cancel-in-progress: false

permissions: {}

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.plan.outputs.tag }}
      skip: ${{ steps.plan.outputs.skip }}
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0 # full history + tags for nightly probing
          persist-credentials: false

      - name: Plan nightly release
        id: plan
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          last_tag=$(git describe --tags --match 'v*-nightly.*' --abbrev=0 2>/dev/null || true)
          if [[ -n "$last_tag" ]] && [[ "$(git rev-parse HEAD)" == "$(git rev-parse "$last_tag^{commit}")" ]]; then
            echo "HEAD already released as $last_tag — nothing to release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          version=$(cargo metadata --no-deps --format-version 1 |
            jq -r '.packages[] | select(.name == "quarry") | .version')
          # Deleted releases leave their tag name immutable, so probe for the
          # first free name rather than assuming today's date tag is usable.
          base="v${version}-nightly.$(date -u +%Y%m%d)"
          tag="$base"
          n=1
          while git rev-parse -q --verify "refs/tags/$tag" >/dev/null ||
              gh release view "$tag" >/dev/null 2>&1; do
            n=$((n + 1))
            tag="$base.$n"
          done
          echo "Releasing $tag"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  build:
    name: Build
    needs: plan
    if: needs.plan.outputs.skip != 'true'
    permissions:
      contents: read
    uses: ./.github/workflows/release-build.yml

  publish:
    name: Publish
    needs: [plan, build]
    if: needs.plan.outputs.skip != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the nightly tag/release and upload artifacts
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          pattern: artifacts-quarry-*
          merge-multiple: true

      - name: Create nightly prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.plan.outputs.tag }}
        run: |
          gh release create "$TAG" --target "$GITHUB_SHA" \
            --prerelease --generate-notes --title "$TAG" \
            dist/*
