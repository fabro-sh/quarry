name: Rust CI

on:
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "fixtures/**"
      - ".github/workflows/rust.yml"
  pull_request:
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "fixtures/**"
      - ".github/workflows/rust.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt
          rustup default stable
      - run: cargo fmt --check --all

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install system prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config libssl-dev fuse3
      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component clippy
          rustup default stable
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          cache-on-failure: true
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      # quarry-server embeds ui/dist at compile time (rust_embed)
      - name: Build browser bundle
        working-directory: ui
        run: |
          bun install --frozen-lockfile
          bun run build
      - run: cargo clippy --locked --workspace --all-targets -- -D warnings
      # The library-document surface (REST library routes, Git sync, CLI
      # puts) is feature-gated; run all package features so it cannot compile
      # to a silent zero-test path.
      - run: cargo clippy --locked -p quarry-server -p quarry-cli -p quarry --all-features --all-targets -- -D warnings

  test:
    name: Test (Linux)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install system prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config libssl-dev fuse3
      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          cache-on-failure: true
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      # quarry-server embeds ui/dist at compile time (rust_embed)
      - name: Build browser bundle
        working-directory: ui
        run: |
          bun install --frozen-lockfile
          bun run build
      - run: cargo test --locked --workspace
      # The lib-documents suites (rest_api.rs, the CLI library commands)
      # compile to ZERO tests without the feature — the workspace run above
      # never executes them.
      - run: cargo test --locked -p quarry-server -p quarry-cli -p quarry --all-features

  test-macos:
    name: Test (macOS)
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          cache-on-failure: true
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      # quarry-server embeds ui/dist at compile time (rust_embed)
      - name: Build browser bundle
        working-directory: ui
        run: |
          bun install --frozen-lockfile
          bun run build
      - run: cargo test --locked --workspace
      - run: cargo test --locked -p quarry-server -p quarry-cli -p quarry --all-features
